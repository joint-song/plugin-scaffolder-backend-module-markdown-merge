version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    groups:
      backstage:
        patterns: ["@backstage/*"]
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
