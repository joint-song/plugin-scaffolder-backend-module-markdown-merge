name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      # Typecheck-only pass: --noEmit keeps this step side-effect-free so the
      # subsequent `yarn build` is the single source of truth for dist-types/.
      - name: Typecheck
        run: yarn tsc --noEmit

      - name: Test
        run: yarn test --ci

      - name: Build
        run: yarn build

      - name: Verify dist artifacts
        run: |
          test -f dist/index.cjs.js
          test -f dist/index.d.ts
          echo "dist contents:"
          ls -la dist
